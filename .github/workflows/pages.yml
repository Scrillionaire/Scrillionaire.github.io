name: Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate site
        run: npm test

      - name: Build Pages artifact with well-known files
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          tar \
            --dereference \
            --hard-dereference \
            --directory site \
            --create \
            --file "$RUNNER_TEMP/artifact.tar" \
            .
          tar --list --file "$RUNNER_TEMP/artifact.tar" | grep -Fx './.well-known/apple-app-site-association'

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify AASA response
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          page_url="${PAGE_URL%/}"
          page_host="${page_url#*://}"
          page_host="${page_host%%/*}"
          aasa_url="$page_url/.well-known/apple-app-site-association"
          origin_headers="$RUNNER_TEMP/aasa-origin-headers"
          origin_body="$RUNNER_TEMP/aasa-origin-body"
          curl \
            --fail \
            --location \
            --max-redirs 0 \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 10 \
            --dump-header "$origin_headers" \
            --output "$origin_body" \
            "$aasa_url"
          if ! grep -Eiq '^content-type:[[:space:]]*(application/json|application/pkcs7-mime)' "$origin_headers"; then
            grep -Eiq '^server:[[:space:]]*GitHub\.com' "$origin_headers"
            grep -Eiq '^content-type:[[:space:]]*application/octet-stream' "$origin_headers"
          fi
          jq -e '
            (.applinks.details | length) == 1 and
            .applinks.details[0].appIDs == ["4AM5US9G8B.ai.scrillionaire.Scrillionaire"] and
            [.applinks.details[0].components[]["/"]] == ["/u/*", "/groups/new", "/groups/*", "/invite/*"]
          ' "$origin_body"

          cdn_headers="$RUNNER_TEMP/aasa-cdn-headers"
          cdn_body="$RUNNER_TEMP/aasa-cdn-body"
          curl \
            --fail \
            --location \
            --max-redirs 0 \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 10 \
            --dump-header "$cdn_headers" \
            --output "$cdn_body" \
            "https://app-site-association.cdn-apple.com/a/v1/$page_host"
          grep -Eiq '^content-type:[[:space:]]*application/json' "$cdn_headers"
          grep -Eiq '^apple-origin-format:[[:space:]]*json' "$cdn_headers"
          jq -e '
            (.applinks.details | length) == 1 and
            .applinks.details[0].appIDs == ["4AM5US9G8B.ai.scrillionaire.Scrillionaire"] and
            [.applinks.details[0].components[]["/"]] == ["/u/*", "/groups/new", "/groups/*", "/invite/*"]
          ' "$cdn_body"
