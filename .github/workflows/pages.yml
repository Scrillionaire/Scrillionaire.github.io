name: Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate site
        run: npm test

      - name: Build Pages artifact with well-known files
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          tar \
            --dereference \
            --hard-dereference \
            --directory site \
            --create \
            --file "$RUNNER_TEMP/artifact.tar" \
            .
          tar --list --file "$RUNNER_TEMP/artifact.tar" | grep -Fx './.well-known/apple-app-site-association'

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify AASA response
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          aasa_url="${PAGE_URL%/}/.well-known/apple-app-site-association"
          headers="$RUNNER_TEMP/aasa-headers"
          body="$RUNNER_TEMP/aasa-body"
          curl \
            --fail \
            --location \
            --max-redirs 0 \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 10 \
            --dump-header "$headers" \
            --output "$body" \
            "$aasa_url"
          grep -Eiq '^content-type:[[:space:]]*(application/json|application/pkcs7-mime)' "$headers"
          jq -e '.applinks.details[0].appIDs == ["4AM5US9G8B.ai.scrillionaire.Scrillionaire"]' "$body"
